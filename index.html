<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PRESSOL Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;600;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { pBlue: '#0069B3', pAnthrazit: '#1D1D1B', pOrange: '#E97600', pGray: '#DADADA' },
                    fontFamily: { roboto: ['Roboto', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        * { font-style: normal !important; }
        video { background: white !important; }
        .video-transition { transition: opacity 0.3s ease-in-out; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #0069B3; border-radius: 10px; }

        /* Compact control bar – Vimeo/Netflix style */
        #ctrl-bar {
            position: absolute; bottom: 0; left: 0; right: 0;
            background: rgba(0,0,0,0.40);
            padding: 0;
            opacity: 0;
            transition: opacity 0.25s ease;
            pointer-events: none;
        }
        #ctrl-bar.visible { opacity: 1; pointer-events: auto; }

        /* Button row inside bar */
        #ctrl-buttons { padding: 2px 14px 2px; display: flex; align-items: center; justify-content: space-between; }

        /* Progress bar – flush at bottom, full width, PRESSOL orange */
        #progress-track { padding: 0; cursor: pointer; display: block; }
        #progress-track .track-inner { height: 5px; transition: height 0.15s ease; background: rgba(255,255,255,0.25); border-radius: 0; position: relative; overflow: hidden; }
        #ctrl-bar.visible #progress-track:hover .track-inner { height: 7px; }

        /* Hide cursor when controls hidden (fullscreen) */
        #player-wrapper.hide-cursor { cursor: none; }

        /* ① Staggered entrance (triggered via .go class after intro) */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(18px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .fade-up     { opacity: 0; }
        .fade-up.go  { animation: fadeUp 0.55s ease forwards; }

        /* ② Active playlist item */
        .playlist-active { border-left: 3px solid #E97600 !important; padding-left: 10px; background: rgba(0,105,179,0.04); border-radius: 2px; }

        /* ③ Thumbnail hover zoom */
        #sidebar-list .group .aspect-video { overflow: hidden; }
        #sidebar-list .group .aspect-video img { transition: transform 0.35s ease; }
        #sidebar-list .group:hover .aspect-video img { transform: scale(1.05); }

        /* ④ Product name + subline fade */
        #display-name, #display-subline, #display-subline-sep, #display-sku { transition: opacity 0.25s ease; }

        /* ⑤ Language switch — slide out right / slide in from left */
        @keyframes langSlideOut {
            from { opacity: 1; transform: translateX(0); }
            to   { opacity: 0; transform: translateX(10px); }
        }
        @keyframes langSlideIn {
            from { opacity: 0; transform: translateX(-16px); }
            to   { opacity: 1; transform: translateX(0); }
        }
        .lang-exit  { animation: langSlideOut 0.30s ease forwards; }
        .lang-enter { opacity: 0; animation: langSlideIn 0.84s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }

        /* ⑥ Shimmer sweep across nav on language change */
        @keyframes shimmerMove {
            from { transform: translateX(-100%); }
            to   { transform: translateX(350%); }
        }
        #nav-wrapper { position: relative; overflow: hidden; }
        #nav-wrapper.shimmer::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0; left: 0;
            width: 50%;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.65) 50%, transparent 100%);
            animation: shimmerMove 1.10s ease forwards;
            pointer-events: none;
            z-index: 10;
        }
        #nav-groups { scrollbar-width: none; -ms-overflow-style: none; }
        #nav-groups::-webkit-scrollbar { display: none; }

        /* ⑧ Video description box */
        #video-desc-inner {
            position: relative;
            transition: max-height 0.35s ease;
        }
        #video-desc-text {
            font-size: 0.8125rem;
            line-height: 1.65;
            color: rgba(40,40,40,0.65);
        }
        #video-desc-more { display: none; }
        @media (max-width: 767px) {
            #video-desc-inner.desc-collapsed {
                max-height: 4.6em;
                overflow: hidden;
            }
            #video-desc-inner.desc-collapsed::after {
                content: '';
                position: absolute;
                bottom: 0; left: 0; right: 0;
                height: 2.2em;
                background: linear-gradient(to bottom, transparent, white);
                pointer-events: none;
            }
            #video-desc-inner.desc-expanded { max-height: 30em; overflow: hidden; }
            #video-desc-more { display: inline-block; }
            #video-desc-inner.desc-expanded ~ #video-desc-more { display: none; }
        }

        /* ⑦ Language picker dropdown */
        @keyframes langMenuOpen {
            from { opacity: 0; transform: scale(0.96) translateY(-4px); }
            to   { opacity: 1; transform: scale(1)    translateY(0); }
        }

        /* Volume slider */
        #vol-slider { -webkit-appearance:none; width:56px; height:3px; background:rgba(255,255,255,0.30); border-radius:2px; outline:none; cursor:pointer; vertical-align:middle; }
        #vol-slider::-webkit-slider-thumb { -webkit-appearance:none; width:10px; height:10px; border-radius:50%; background:white; cursor:pointer; }

        /* Vimeo thumbnail placeholder while real thumb loads */
        .vimeo-thumb-img { background: linear-gradient(135deg, #0069B3 0%, #004982 100%); object-fit: cover; }

        /* ── Cinematic intro overlay ─────────────────────────────── */
        #intro-overlay {
            position: fixed; inset: 0; z-index: 1000;
            background: #ffffff;
            display: flex; align-items: center; justify-content: center;
        }
        /* Logo materialises from white-hot blur → crisp PRESSOL blue */
        @keyframes logoApproach {
            0%   { transform: scale(0.46) translateY(26px); filter: blur(65px) brightness(12); opacity: 0; }
            8%   { opacity: 1; filter: blur(50px) brightness(7); }
            70%  { transform: scale(0.97)  translateY(1.5px); filter: blur(1.5px)  brightness(1.04); }
            100% { transform: scale(1.0)   translateY(0px);   filter: blur(0px)    brightness(1);    opacity: 1; }
        }
        @keyframes introDismiss {
            0%   { opacity: 1; }
            100% { opacity: 0; }
        }
        #intro-logo {
            animation: logoApproach 3.0s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            /* Width-only sizing — height auto = no squishing */
            width: clamp(120px, 26vw, 320px);
            height: auto;
        }
        #intro-overlay.dismiss { animation: introDismiss 0.75s ease forwards; }

        /* ── Vimeo overlay: blocks logo redirect, adds our FS button ─ */
        #vimeo-overlay { position: absolute; inset: 0; z-index: 4; pointer-events: none; display: none; }
        #vimeo-logo-block { position: absolute; bottom: 0; left: 0; width: 80px; height: 54px; pointer-events: auto; cursor: default; }
        #vimeo-fs-btn {
            position: absolute; bottom: 10px; right: 10px;
            width: 36px; height: 36px; pointer-events: auto;
            background: rgba(0,0,0,0.50); border: none; cursor: pointer;
            border-radius: 4px; color: white; display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        #vimeo-fs-btn:hover { background: rgba(0,0,0,0.75); }

        /* ── Nav scroll hint (right-edge fade, mobile only) ────── */
        .nav-scroll-wrap { position: relative; flex: 1; min-width: 0; }
        #nav-fade-hint {
            position: absolute; top: 0; right: 0; bottom: 0; width: 72px;
            background: linear-gradient(to right, transparent, white 88%);
            pointer-events: none;
            transition: opacity 0.4s ease;
        }
        @media (min-width: 768px) { #nav-fade-hint { display: none; } }
    </style>
</head>

            document.getElementById('intro-overlay').style.display = 'none';

            'DE': {
                '12_633': 'Die PRESSOL PRELIxx Standard-Fettpresse liefert auch nach 40.000 Arbeitsspielen konstante Schmierleistung. Der variable Hub ermöglicht optimale Anpassung an Gegendruck und Fördermenge. Kompatibel mit Standard-Kartuschen und allen gängigen Schmiernippeln.',
                '12_062': 'Das PRESSOL Hochdruck-Mundstück überwindet zuverlässig auch verharzte und schwer zugängliche Schmierstellen. Die robuste Stahlkonstruktion hält Drücken bis 500 bar stand. Passt auf alle gängigen PRESSOL Fettpressenkupplungen.',
                '18_072': 'Die pneumatische PRESSOL Fettpresse ermöglicht kontinuierliches Schmieren ohne körperliche Ermüdung. Einfach an die Druckluftversorgung anschließen – ideal für Werkstätten mit hohem täglichem Schmierbedarf. Verarbeitet Fette bis NLGI 3.',
                '12_630': 'Die PRESSOL Einhand-Fettpresse wurde speziell für das Schmieren mit einer Hand entwickelt. Der umschaltbare Hub ermöglicht wahlweise hohes Fördervolumen oder maximalen Druck. Perfekt für schwer zugängliche Schmierstellen.',
                '45_319': 'Der PRESSOL mobiBLUE 450 l ist der mobile AdBlue®-Tank für professionellen Fuhrpark- und Werkstatteinsatz. Mit integrierter Pumpe, Zähler und Zapfventil – komplett einsatzbereit auf Rollen. Sicher, zuverlässig und nach WHG geprüft.',
                '23_163': 'Das PRESSOL Zapfventil aus PP eignet sich für die manuelle Abgabe von Diesel, Heizöl und AdBlue®. Leicht und korrosionsbeständig – ideal für häufigen Einsatz und einfache Reinigung. Zugelassen für alle gängigen Kraftstoffe.',
                '23_176': 'Das PRESSOL Automatik-Zapfventil unterbricht den Kraftstofffluss selbstständig bei Tankfüllung. Sicher, spritzfrei und komfortabel – ideal für Fuhrparks und Tankstellen. Reduziert Überfüllrisiko und Kraftstoffverluste zuverlässig.',
                '13_055': 'Die PRESSOL Rotationspumpe fördert Diesel, Heizöl und leichte Öle direkt aus Fässern und IBC-Tanks. Einfache Handkurbel-Bedienung ohne Stromanschluss – überall einsetzbar. Stabil, wartungsarm und beständig gegen Mineralöle.',
                '19_698': 'Der digitale PRESSOL Durchflusszähler erfasst Einzel- und Gesamtmengen präzise und übersichtlich. Das beleuchtete Display ist auch bei schlechten Lichtverhältnissen gut ablesbar. Ideal für das professionelle Kraftstoff- und Flüssigkeitsmanagement.',
                '07_623': 'Der PRESSOL Messbecher mit 3 l Fassungsvermögen ist aus lebensmittelechtem, bruchsicherem Kunststoff gefertigt. Die klar lesbare Graduierung ermöglicht präzises Abmessen – in Werkstatt und Gastronomie gleichermaßen beliebt. Spülmaschinenfest und temperaturbeständig.',
                '13_012': 'Die PRESSOL Fasspumpe SRL fördert Öle und Kraftstoffe sicher und schnell aus 60 l und 200 l Fässern. Das verlängerbare Saugrohr passt sich an verschiedene Fassgrößen an. Robust, selbstansaugend und in verschiedenen Materialausführungen erhältlich.',
                '18_082': 'Das PRESSOL Z-Drehgelenk ermöglicht torsionsfreie Schlauchführung in alle Richtungen. Es verhindert Schlauchknicke und verlängert damit die Schlauchlebensdauer erheblich. Kompatibel mit Standard-Hochdruckschläuchen.',
                '19_768': 'Die fahrbare PRESSOL Sprüheinheit bringt Druckluft und Sprühmedium flexibel an jeden Arbeitsplatz. Pneumatisch angetrieben, mit großem Vorratstank – ideal für Konservierungs- und Reinigungsarbeiten. Mobil, leistungsstark und komfortabel.',
                '18_616_051': 'Die pneumatische PRESSOL Fettpumpe 15:1 fördert Fett direkt aus dem 50 kg oder 180 kg Originalgebinde. Das hohe Übersetzungsverhältnis ermöglicht auch die Förderung schwer fließender Hochleistungsfette. Konzipiert für den Dauerbetrieb in Industrie und Werkstatt.',
                '18_516_051': 'Die PRESSOL Fett- und Silikonpumpe verarbeitet Fette und Silikone direkt aus dem Originalgebinde. Pneumatisch angetrieben für kontinuierlichen Betrieb ohne Ermüdung – ideal für Karosserie- und Fahrzeugpflege. Einfacher Medienwechsel durch modularen Aufbau.',
                '18_870': 'Der PRESSOL Fußventil-Umbausatz ermöglicht die einfache Nachrüstung von Pumpen auf Ansaugbetrieb. Damit wird auch der letzte Rest aus dem Gebinde gefördert – ressourcenschonend und wirtschaftlich. Kompatibel mit gängigen PRESSOL Pumpenmodellen.',
                '19_519': 'Die PRESSOL Fassverschraubung M 62 stellt den sicheren Anschluss für Pumpen an Standard-Fässer mit M 62-Gewinde her. Robuste Stahlausführung für dauerhafte Dichtheit und schnellen Pumpenwechsel. Das Standardgewinde für europäische 200 l-Fässer.',
                '19_529': 'Die PRESSOL Fassverschraubung M 60 verbindet Pumpen sicher mit Fässern mit M 60-Innengewinde. Ideal als Ergänzung oder Ersatzteil für bestehende Systeme. Robust, dicht und einfach zu montieren.',
                '23_296': 'Der PRESSOL Zähleranschluss integriert Durchflussmesser sicher und dicht in jedes Abgabesystem. Standardisierte Anschlussmaße für universelle Kompatibilität. Robust und für dauerhaften Einsatz ausgelegt.',
                '23_295': 'Das PRESSOL Zählerkit enthält alle Komponenten für die einfache Nachrüstung eines Durchflusszählers. Im Lieferumfang sind alle Anschlüsse, Dichtungen und Halterungen enthalten. Schnell montiert, präzise und zuverlässig.',
                'messbecher': 'Der neue PRESSOL Messbecher 2026 vereint lebensmittelechtes Material mit optimierter Graduierung für höchste Ablesepräzision. Ideal für Werkstatt und Gastronomie – robust, spülmaschinenfest und angenehm zu handhaben. Das überarbeitete Design 2026 setzt neue Maßstäbe für Präzisionsbecher.',

                'kanisterentlueftung': 'Die sichere Kanisterentlüftung ist ein wichtiger Schutz vor gefährlichem Überdruck in Kraftstoffkanistern. Dieses Video erklärt, wie der PRESSOL Entlüftungskanister funktioniert und welche Sicherheitsvorteile er bietet. Pflicht für jeden, der regelmäßig mit Kraftstoffkanistern arbeitet.',
                'adblue_fasspumpe': 'Die FMT Fasspumpe 13040 überzeugt mit einfachster Bedienung beim Befüllen aus AdBlue®-Fässern. Das Video zeigt Montage und Betrieb Schritt für Schritt – schnell, sicher und zuverlässig für den professionellen Fuhrparkeinsatz. Eine kompakte Lösung für die tägliche AdBlue®-Versorgung.',

                '12_062': "L'embout haute pression PRESSOL atteint de manière fiable même les points de graissage encrassés ou difficiles d'accès. La construction en acier robuste résiste à des pressions allant jusqu'à 500 bar. Compatible avec tous les accouplements de pompe à graisse PRESSOL.",

                'adblue_fasspumpe': "La pompe de fût FMT 13040 se distingue par sa simplicité d'utilisation lors du remplissage depuis des fûts d'AdBlue®. La vidéo montre le montage et le fonctionnement étape par étape – rapide, sûr et fiable. Une solution compacte pour l'approvisionnement quotidien en AdBlue®.",
                'tankfixx': "Le système FMT TankFIXX protège durablement les réservoirs de carburant contre les saletés, la condensation et les algues. Cette vidéo d'installation vous guide étape par étape – parfait pour véhicules, engins de chantier et réservoirs fixes. Une protection fiable sur le long terme.",
                'manufacturing_specialists': "Ce film institutionnel présente PRESSOL comme fabricant leader de solutions de lubrification et de ravitaillement. Du développement à la production, tous les processus sont réalisés en interne avec le plus haut contrôle qualité. PRESSOL est synonyme de fiabilité et d'innovation depuis des décennies.",
                'from_idea_to_reality': "De la première idée au produit fini, ce film accompagne l'ensemble du processus de développement chez PRESSOL. Ingénieurs, designers et experts en fabrication travaillent ensemble pour créer des solutions robustes. Un regard sur la culture d'innovation d'un fabricant de qualité."
            },
            'ES': {
                '12_633': 'La pistola de engrase estándar PRESSOL PRELIxx ofrece rendimiento constante incluso después de 40.000 ciclos. La carrera variable permite adaptación óptima a la contrapresión y al caudal. Compatible con cartuchos estándar y todas las graseras comunes.',
                '12_062': 'El acoplador de alta presión PRESSOL alcanza de forma fiable incluso los puntos de engrase más difíciles. La robusta construcción en acero soporta presiones de hasta 500 bar. Compatible con todos los acoplamientos de pistola PRESSOL.',
                '18_072': 'La pistola de engrase neumática PRESSOL permite el engrase continuo sin fatiga física. Conecte simplemente al suministro de aire comprimido – ideal para talleres con alta demanda. Procesa grasas hasta NLGI 3.',
                '12_630': 'La pistola de engrase de una mano PRESSOL está diseñada para engrasar con una sola mano. La carrera conmutable permite alto caudal o presión máxima. Perfecta para puntos de engrase de difícil acceso.',
                '45_319': 'El PRESSOL mobiBLUE 450 l es el depósito móvil de AdBlue® para uso profesional en flotas y talleres. Completo con bomba, contador y pistola integrados – listo para usar sobre ruedas. Seguro, fiable y certificado.',
                '23_163': 'La pistola manual PRESSOL en PP es adecuada para la distribución de gasóleo, gasoil y AdBlue®. Ligera y resistente a la corrosión – ideal para uso frecuente y limpieza fácil. Homologada para todos los combustibles habituales.',
                '23_176': 'La pistola automática PRESSOL detiene automáticamente el flujo de combustible al llenarse el depósito. Segura, sin salpicaduras y cómoda – ideal para flotas y gasolineras. Reduce el riesgo de derrame y las pérdidas de combustible.',
                '13_055': 'La bomba rotativa PRESSOL transfiere gasóleo, gasoil y aceites ligeros directamente desde bidones y depósitos IBC. Manejo sencillo con manivela sin necesidad de electricidad. Robusta, de bajo mantenimiento y resistente a aceites minerales.',
                '19_698': 'El medidor digital PRESSOL registra cantidades individuales y totales con precisión y claridad. La pantalla iluminada es legible incluso en condiciones de poca luz. Ideal para la gestión profesional de combustibles y líquidos.',
                '07_623': 'La jarra graduada PRESSOL de 3 l está fabricada en plástico alimentario irrompible. La graduación claramente legible permite una medición precisa – popular en talleres y hostelería. Apta para lavavajillas y resistente a la temperatura.',
                '13_012': 'La bomba de bidón PRESSOL SRL transfiere aceites y combustibles de forma segura y rápida desde bidones de 60 l y 200 l. El tubo de aspiración extensible se adapta a distintos tamaños. Robusta, autocebante y disponible en diferentes materiales.',
                '18_082': 'La junta giratoria en Z PRESSOL permite la orientación libre del manguito sin torsión. Evita los codos y prolonga significativamente la vida útil del manguito. Compatible con mangueras de alta presión estándar.',
                '19_768': 'La unidad de pulverización móvil PRESSOL lleva aire comprimido y producto a cualquier puesto de trabajo. Accionamiento neumático con gran depósito – ideal para trabajos de conservación y limpieza. Móvil, potente y cómoda.',
                '18_616_051': 'La bomba de grasa neumática PRESSOL 15:1 distribuye grasa directamente desde el envase original de 50 kg o 180 kg. La alta relación permite también las grasas de alto rendimiento de alta viscosidad. Diseñada para uso continuo en industria y talleres.',
                '18_516_051': 'La bomba de grasa y silicona PRESSOL procesa grasas y siliconas directamente desde el envase original. Accionamiento neumático para funcionamiento continuo sin fatiga. Cambio de producto fácil gracias al diseño modular.',
                '18_870': 'El kit de conversión de válvula de pie PRESSOL permite la fácil adaptación de bombas para funcionamiento por aspiración. Así se recupera hasta la última gota del envase. Compatible con los modelos habituales de bomba PRESSOL.',
                '19_519': 'El tapón de bidón M 62 PRESSOL proporciona una conexión segura para bombas a bidones estándar con rosca M 62. Construcción robusta en acero para un sellado duradero y cambio rápido de bomba. La rosca estándar para bidones europeos de 200 l.',
                '19_529': 'El tapón de bidón M 60 PRESSOL conecta bombas de forma segura a bidones con rosca interior M 60. Ideal como complemento o repuesto para sistemas existentes. Robusto, estanco y fácil de instalar.',
                '23_296': 'La conexión del medidor PRESSOL integra caudalímetros de forma segura en cualquier sistema de distribución. Dimensiones de conexión estandarizadas para compatibilidad universal. Robusto y diseñado para uso prolongado.',
                '23_295': 'El kit medidor PRESSOL contiene todos los componentes para instalar fácilmente un caudalímetro. Incluye todas las conexiones, juntas y soportes. Instalación rápida, precisa y fiable.',
                'messbecher': 'La nueva jarra graduada PRESSOL 2026 combina material alimentario con graduación optimizada para máxima precisión de lectura. Ideal para talleres y hostelería – robusta, apta para lavavajillas y cómoda de usar. El diseño revisado 2026 establece nuevos estándares.',
                'messbecher_gastro': 'La aplicación gastronómica de la jarra graduada PRESSOL muestra la versatilidad de las jarras de precisión en el uso profesional diario. Dosificación, mezclas o medición rápida bajo presión de tiempo – el vídeo demuestra los usos prácticos en hostelería.',
                'kanisterentlueftung': 'La ventilación segura de bidones protege contra la sobrepresión peligrosa en bidones de combustible. Este vídeo explica cómo funciona el bidón ventilado PRESSOL y qué ventajas de seguridad ofrece. Imprescindible para quien trabaja regularmente con bidones de combustible.',
                'adblue_fasspumpe': 'La bomba de bidón FMT 13040 destaca por su sencilla operación al llenar desde bidones de AdBlue®. El vídeo muestra el montaje y el funcionamiento paso a paso – rápido, seguro y fiable. Una solución compacta para el suministro diario de AdBlue®.',
                'tankfixx': 'El sistema FMT TankFIXX protege permanentemente los depósitos de combustible contra suciedad, condensación y algas. Este vídeo de instalación guía paso a paso a través del sencillo montaje – perfecto para vehículos, maquinaria de obra y depósitos fijos. Una vez instalado, protege a largo plazo.',
                'manufacturing_specialists': 'Este vídeo corporativo presenta a PRESSOL como fabricante líder de soluciones de lubricación y repostaje. Desde el desarrollo hasta la producción, todos los procesos se realizan internamente con el mayor control de calidad. PRESSOL es sinónimo de fiabilidad e innovación desde hace décadas.',
                'from_idea_to_reality': 'Desde la primera idea hasta el producto terminado, este film acompaña todo el proceso de desarrollo en PRESSOL. Ingenieros, diseñadores y expertos en fabricación trabajan juntos para crear soluciones robustas. Una visión de la cultura de innovación de un fabricante de calidad.'
            },
            'NL': {
                '12_633': 'Het PRESSOL PRELIxx standaard vetspuit levert constante smeerprestaties zelfs na 40.000 slagen. De variabele slag maakt optimale aanpassing aan tegendruk en debiet mogelijk. Compatibel met standaard cartridges en alle gangbare smeerkoppen.',
                '12_062': 'De PRESSOL hogedrukkop bereikt betrouwbaar zelfs veraarde of moeilijk toegankelijke smeerpunten. De robuuste staalconstructie weerstaat drukken tot 500 bar. Past op alle PRESSOL vetspuitleidingkoppelingen.',
                '18_072': 'De pneumatische PRESSOL vetspuit maakt continu smeren mogelijk zonder lichamelijke vermoeidheid. Sluit eenvoudig aan op de persluchtvoorziening – ideaal voor werkplaatsen met hoge dagelijkse smeerbehoefte. Verwerkt vetten tot NLGI 3.',
                '12_630': 'De PRESSOL eenhandsvetspuit is speciaal ontworpen voor smeren met één hand. De omschakelbare slag maakt hoog debiet of maximale druk mogelijk. Ideaal voor moeilijk bereikbare smeerpunten.',
                '45_319': 'De PRESSOL mobiBLUE 450 l is de mobiele AdBlue®-tank voor professioneel wagenparkbeheer en werkplaatsgebruik. Compleet met geïntegreerde pomp, teller en tapventiel – direct inzetbaar op wielen. Veilig, betrouwbaar en gecertificeerd.',
                '23_163': 'Het PRESSOL tapventiel van PP is geschikt voor handmatige afgifte van diesel, stookolie en AdBlue®. Licht en corrosiebestendig – ideaal voor frequent gebruik en eenvoudige reiniging. Goedgekeurd voor alle gangbare brandstoffen.',
                '23_176': 'Het PRESSOL automatisch tapventiel stopt de brandstofstroom automatisch bij een volle tank. Veilig, spatvrij en comfortabel – ideaal voor wagenparken en tankstations. Vermindert overlooprisico en brandstofverlies betrouwbaar.',
                '13_055': 'De PRESSOL rotatiepomp pompt diesel, stookolie en lichte oliën direct uit vaten en IBC-tanks. Eenvoudige handbediening zonder stroom – overal inzetbaar. Robuust, onderhoudsarm en bestand tegen minerale oliën.',
                '19_698': 'De digitale PRESSOL doorstroommeter registreert enkelvoudige en totale hoeveelheden nauwkeurig en overzichtelijk. Het verlichte display is ook bij slechte verlichting goed afleesbaar. Ideaal voor professioneel brandstof- en vloeistofbeheer.',
                '07_623': 'De PRESSOL maatbeker met 3 l inhoud is gemaakt van voedselveilig, breukvast kunststof. De duidelijk leesbare schaalverdeling maakt nauwkeurig meten mogelijk – geliefd in werkplaats en horeca. Vaatwasmachinebestendig en temperatuurbestendig.',
                '13_012': 'De PRESSOL vatpomp SRL pompt oliën en brandstoffen snel en veilig uit vaten van 60 l en 200 l. De verlengbare zuigbuis past zich aan aan verschillende vatgroottes. Robuust, zelfaanzuigend en in verschillende materiaaluitvoeringen beschikbaar.',
                '18_082': 'Het PRESSOL Z-draaischarnier maakt torsievrije slangaansluiting in alle richtingen mogelijk. Het voorkomt slangknikken en verlengt de levensduur aanzienlijk. Compatibel met standaard hogedrukslangen.',
                '19_768': 'De mobiele PRESSOL spuitunit brengt perslucht en spuitmedium flexibel naar elke werkplek. Pneumatisch aangedreven met grote voorraadtank – ideaal voor conserverings- en reinigingswerk. Mobiel, krachtig en comfortabel.',
                '18_616_051': 'De pneumatische PRESSOL vetpomp 15:1 pompt vet direct uit de originele verpakking van 50 kg of 180 kg. De hoge overbrengingsverhouding maakt ook de overdracht van hoogviskeuze vetten mogelijk. Ontworpen voor continu gebruik in industrie en werkplaats.',
                '18_516_051': 'De PRESSOL vet- en siliconenpomp verwerkt vetten en siliconen direct uit de originele verpakking. Pneumatisch aangedreven voor continu gebruik zonder vermoeidheid. Eenvoudige mediawisseling dankzij modulair ontwerp.',
                '18_870': 'De PRESSOL voetventielombouwset maakt eenvoudige ombouw van pompen voor aanzuigbedrijf mogelijk. Zo wordt ook de laatste druppel uit de verpakking gehaald – economisch en milieuvriendelijk. Compatibel met gangbare PRESSOL pompmodellen.',
                '19_519': 'De PRESSOL vatverschroeiing M 62 biedt een veilige aansluiting voor pompen op standaard vaten met M 62-draad. Robuuste staaluitvoering voor blijvende dichtheid en snelle pompwisseling. De standaard draad voor Europese vaten van 200 l.',
                '19_529': 'De PRESSOL vatverschroeiing M 60 verbindt pompen veilig met vaten met M 60-binnendraad. Ideaal als aanvulling of vervangend onderdeel voor bestaande systemen. Robuust, dicht en eenvoudig te monteren.',
                '23_296': 'De PRESSOL meteraansluiting integreert doorstroommeter veilig en dicht in elk afgiftesysteem. Gestandaardiseerde aansluitafmetingen voor universele compatibiliteit. Robuust en ontworpen voor duurzaam gebruik.',
                '23_295': 'De PRESSOL meterkit bevat alle componenten voor eenvoudige naplaatsing van een doorstroommeter. Inclusief alle aansluitingen, afdichtingen en beugels. Snel gemonteerd, nauwkeurig en betrouwbaar.',
                'messbecher': 'De nieuwe PRESSOL maatbeker 2026 combineert voedselveilig materiaal met geoptimaliseerde schaalverdeling voor maximale leesbaarheid. Ideaal voor werkplaats en horeca – robuust, vaatwasmachinebestendig en prettig in gebruik. Het herziene 2026-ontwerp stelt nieuwe normen.',
                'messbecher_gastro': 'De PRESSOL maatbeker gastrogebruik toont de veelzijdigheid van precisiemaatbekers in het dagelijks professioneel gebruik. Of het nu om portionering, mengverhoudingen of snel meten gaat – de video toont praktische toepassingen in de horeca.',
                'kanisterentlueftung': 'Veilige kanisterventilatie beschermt tegen gevaarlijke overdruk in brandstofkannen. Deze video legt uit hoe de PRESSOL geventileerde jerrycan werkt en welke veiligheidsvoordelen hij biedt. Onmisbaar voor iedereen die regelmatig met brandstofkannen werkt.',
                'adblue_fasspumpe': 'De FMT vatpomp 13040 imponiert door zijn eenvoudige bediening bij het vullen vanuit AdBlue®-vaten. De video toont montage en bediening stap voor stap – snel, veilig en betrouwbaar. Een compacte oplossing voor de dagelijkse AdBlue®-voorziening.',
                'tankfixx': 'Het FMT TankFIXX-systeem beschermt brandstoftanks permanent tegen vuil, condensatie en algen. Deze installatievideo begeleidt stap voor stap door de eenvoudige montage – perfect voor voertuigen, bouwmachines en vaste tanks. Eenmaal geïnstalleerd biedt het betrouwbare langetermijnbescherming.',
                'manufacturing_specialists': 'Deze bedrijfsfilm presenteert PRESSOL als toonaangevende fabrikant van smeertechnologie en tankoplossingen. Van ontwikkeling tot productie worden alle processen intern uitgevoerd met de hoogste kwaliteitscontrole. PRESSOL staat al decennia voor betrouwbaarheid en innovatie.',
                'from_idea_to_reality': 'Van het eerste idee tot het afgewerkte product begeleidt deze film het volledige ontwikkelingsproces bij PRESSOL. Ingenieurs, ontwerpers en productie-experts werken nauw samen om robuuste oplossingen te creëren. Een blik op de innovatiecultuur van een kwaliteitsfabrikant.'
            },
            'CZ': {
                '12_633': 'Standardní mazací lis PRESSOL PRELIxx dodává konstantní mazací výkon i po 40 000 pracovních cyklech. Variabilní zdvih umožňuje optimální přizpůsobení protitlaku a průtoku. Kompatibilní se standardními kazetami a všemi běžnými mazacími niplemi.',
                '12_062': 'Sklíčidlová spojka PRESSOL spolehlivě dosáhne i zanesená nebo těžko přístupná mazací místa. Robustní ocelová konstrukce odolává tlakům až 500 bar. Pasuje na všechny mazací lisy PRESSOL.',
                '18_072': 'Pneumatický mazací lis PRESSOL umožňuje kontinuální mazání bez fyzické únavy. Jednoduše připojte ke zdroji stlačeného vzduchu – ideální pro dílny s vysokou denní potřebou mazání. Zpracovává maziva až do třídy NLGI 3.',
                '12_630': 'Jednoruční mazací lis PRESSOL byl speciálně vyvinut pro mazání jednou rukou. Přepínatelný zdvih umožňuje volbu mezi vysokým průtokem nebo maximálním tlakem. Ideální pro těžko přístupná mazací místa.',
                '45_319': 'PRESSOL mobiBLUE 450 l je mobilní nádrž na AdBlue® pro profesionální provoz flotily a dílny. Kompletní s integrovaným čerpadlem, průtokoměrem a výdejní pistolí – připraveno k použití na kolečkách. Bezpečný, spolehlivý a certifikovaný.',
                '23_163': 'Výdejní pistole PRESSOL z PP je vhodná pro ruční výdej nafty, topného oleje a AdBlue®. Lehká a odolná proti korozi – ideální pro časté použití a snadné čištění. Schválena pro všechna běžná paliva.',
                '23_176': 'Automatická výdejní pistole PRESSOL automaticky zastaví průtok paliva při plném nádrži. Bezpečná, bez stříkání a pohodlná – ideální pro flotily a čerpací stanice. Spolehlivě snižuje riziko přeplnění a ztráty paliva.',
                '13_055': 'Rotační čerpadlo PRESSOL přečerpává naftu, topný olej a lehké oleje přímo ze sudů a IBC nádrží. Jednoduché ruční ovládání bez elektrického připojení – použitelné kdekoliv. Robustní, nenáročné na údržbu a odolné vůči minerálním olejům.',
                '19_698': 'Digitální průtokoměr PRESSOL zaznamenává jednotlivá a celková množství přesně a přehledně. Podsvícený displej je dobře čitelný i za špatných světelných podmínek. Ideální pro profesionální správu paliv a kapalin.',
                '07_623': 'Odměrka PRESSOL o objemu 3 l je vyrobena z potravinářsky bezpečného, nerozbitného plastu. Dobře čitelná stupnice umožňuje přesné měření – oblíbená v dílnách i gastronomii. Vhodná do myčky nádobí a teplotně odolná.',
                '13_012': 'Sudové čerpadlo PRESSOL SRL přečerpává oleje a paliva bezpečně a rychle ze sudů 60 l a 200 l. Prodlužitelná sací trubice se přizpůsobí různým velikostem sudů. Robustní, samosací a dostupné v různých materiálových provedeních.',
                '18_082': 'Otočný kloub Z PRESSOL umožňuje torzně volné vedení hadice ve všech směrech. Zabraňuje ohybu hadice a výrazně prodlužuje její životnost. Kompatibilní se standardními vysokotlakými hadicemi.',
                '19_768': 'Mobilní postřikovač PRESSOL přináší stlačený vzduch a postřikovací médium flexibilně na každé pracoviště. Pneumatický pohon s velkou zásobní nádrží – ideální pro konzervační a čisticí práce. Mobilní, výkonný a pohodlný.',
                '18_616_051': 'Pneumatické mazací čerpadlo PRESSOL 15:1 dodává mazivo přímo z originálního balení 50 kg nebo 180 kg. Vysoký převodový poměr umožňuje i dopravu vysoce výkonných maziv. Navrženo pro nepřetržitý provoz v průmyslu a dílnách.',
                '18_516_051': 'Čerpadlo na mazivo a silikon PRESSOL zpracovává maziva a silikony přímo z originálního balení. Pneumatický pohon pro nepřetržitý provoz bez únavy – ideální pro karosářské práce. Snadná výměna média díky modulárnímu provedení.',
                '18_870': 'Sada pro přestavbu zpětného ventilu PRESSOL umožňuje snadnou přestavbu čerpadel na sací provoz. Tak je z balení vytažena i poslední kapka – hospodárné a ekologické. Kompatibilní s běžnými modely čerpadel PRESSOL.',
                '19_519': 'Šroubení sudu M 62 PRESSOL zajišťuje bezpečné připojení čerpadel ke standardním sudům se závitem M 62. Robustní ocelové provedení pro trvalou těsnost a rychlou výměnu čerpadla. Standardní závit pro evropské sudy 200 l.',
                '19_529': 'Šroubení sudu M 60 PRESSOL bezpečně spojuje čerpadla se sudy s vnitřním závitem M 60. Ideální jako doplněk nebo náhradní díl pro stávající systémy. Robustní, těsné a snadno montovatelné.',
                '23_296': 'Přípojka průtokoměru PRESSOL bezpečně a těsně integruje průtokoměry do každého výdejního systému. Standardizované rozměry přípojek pro univerzální kompatibilitu. Robustní a navržená pro trvalé použití.',
                '23_295': 'Sada průtokoměru PRESSOL obsahuje všechny součásti pro snadnou dodatečnou montáž průtokoměru. V dodávce jsou zahrnuty všechny přípojky, těsnění a držáky. Rychlá montáž, přesná a spolehlivá.',
                'messbecher': 'Nová odměrka PRESSOL 2026 kombinuje materiál vhodný pro potraviny s optimalizovanou stupnicí pro maximální přesnost odečítání. Ideální pro dílny a gastronomii – robustní, vhodná do myčky a příjemná na rukou. Přepracovaný design 2026 nastavuje nové standardy.',
                'messbecher_gastro': 'PRESSOL gastronomická aplikace odměrky ukazuje všestrannost přesných odměrek v každodenním profesionálním provozu. Dávkování, míchání nebo rychlé měření pod časovým tlakem – video ukazuje praktické využití v gastronomii.',
                'kanisterentlueftung': 'Bezpečné odvzdušnění kanistrů chrání před nebezpečným přetlakem v palivových kanistrech. Toto video vysvětluje funkci odvzdušňovacího kanistr PRESSOL a jeho bezpečnostní výhody. Nezbytné pro každého, kdo pravidelně pracuje s palivovými kanistrami.',
                'adblue_fasspumpe': 'Sudové čerpadlo FMT 13040 přesvědčuje jednoduchou obsluhou při plnění z AdBlue® sudů. Video ukazuje montáž a provoz krok za krokem – rychle, bezpečně a spolehlivě. Kompaktní řešení pro každodenní zásobování AdBlue®.',
                'tankfixx': 'Systém FMT TankFIXX chrání palivové nádrže trvale před nečistotami, kondenzací a řasami. Toto instalační video provede krok za krokem jednoduchou montáží – ideální pro vozidla, stavební stroje a stacionární nádrže. Po instalaci poskytuje spolehlivou dlouhodobou ochranu.',
                'manufacturing_specialists': 'Tento firemní film představuje PRESSOL jako předního výrobce mazacích technologií a zásobovacích řešení. Od vývoje po výrobu probíhají všechny procesy interně s nejvyšší kontrolou kvality. PRESSOL stojí za spolehlivostí a inovacemi po desetiletí.',
                'from_idea_to_reality': 'Od první myšlenky k hotovému produktu provází tento film celý vývojový proces v PRESSOL. Inženýři, designéři a výrobní odborníci úzce spolupracují při tvorbě robustních řešení. Pohled do inovační kultury výrobce kvality.'
            },
            'PT': {
                '12_633': 'A pistola de lubrificação padrão PRESSOL PRELIxx oferece desempenho constante mesmo após 40.000 ciclos. A carreira variável permite a adaptação ideal à contrapressão e ao caudal. Compatível com cartuchos padrão e todos os nipletes de lubrificação comuns.',
                '12_062': 'O acoplador de alta pressão PRESSOL atinge de forma fiável mesmo os pontos de lubrificação mais obstruídos ou difíceis de aceder. A construção robusta em aço suporta pressões até 500 bar. Compatível com todos os acoplamentos de pistola PRESSOL.',

                'messbecher': 'O novo copo medidor PRESSOL 2026 combina material alimentar com graduação otimizada para máxima precisão de leitura. Ideal para oficinas e restauração – robusto, lavável em máquina e confortável de usar. O design revisto 2026 define novos padrões.',

        const videoSublines = {

        // ── Categories ────────────────────────────────────────────────────
        const cats = {

        let activeLang = 'DE', activeCat = "Schmiergeräte";

            return (i18n[activeLang] && i18n[activeLang][key]) ? i18n[activeLang][key] : (i18n['EN'][key] || key.replace(/_/g, ' '));

        function renderLangs() {
            const langs = ['DE','EN','CZ','NL','FR','ES','PT'];

                    `<button onclick="setLang('${l}')"
                             class="w-8 h-6 border font-bold text-[9px] ${activeLang === l ? 'bg-pBlue text-white border-pBlue' : 'border-pGray text-pAnthrazit/40 hover:border-pBlue'}">${l}</button>`
                ).join('') + `</div>`;

            if (desk) desk.innerHTML = desktopHtml;
        }

        function toggleLangMenu(e) {
            e.stopPropagation();
            const menus = document.querySelectorAll('.lang-menu');
            const isOpen = [...menus].some(m => !m.classList.contains('hidden'));
            menus.forEach(m => m.classList.add('hidden'));
            if (!isOpen) {
                menus.forEach(m => {
                    m.classList.remove('hidden');
                    m.style.animation = 'none';
                    void m.offsetWidth;
                    m.style.animation = 'langMenuOpen 0.2s cubic-bezier(0.25,0.46,0.45,0.94) forwards';
                });
            }
        }
        document.addEventListener('click', () => {
            document.querySelectorAll('.lang-menu').forEach(m => m.classList.add('hidden'));
        });

        function renderNav() {
            document.getElementById('nav-groups').innerHTML = Object.keys(cats).map(c => `
                <button onclick="loadCategory('${c}')" class="whitespace-nowrap flex-shrink-0 text-sm font-[900] uppercase pb-2 border-b-4 transition-all ${activeCat === c ? 'border-pOrange text-pAnthrazit' : 'border-transparent text-pAnthrazit/40 hover:text-pBlue'}">${t(c)}</button>
            `).join('');
        }

        let _langAnim = false;

        function loadCategory(cat) {
            activeCat = cat;
            renderNav();
            document.getElementById('sidebar-label').innerText = t('Playlist');
            const list = document.getElementById('sidebar-list');
            const animCls   = _langAnim ? 'lang-enter' : 'fade-up';
            const animDelay = _langAnim ? (i) => i * 75 : (i) => 260 + i * 65;

            list.innerHTML = cats[cat].map((id, i) => {
                const isVimeo = !!vimeoMap[id];
                const thumbEl = isVimeo
                    ? `<img class="vimeo-thumb-img w-full h-full" src="" alt="${t(id)}" loading="lazy">`
                    : `<img src="https://videohub.pressol.iol.eu/thumbs/${id}_${activeLang}.jpg" class="w-full h-full object-cover" loading="lazy">`;
                const metaEl = isVimeo
                    ? ``
                    : `<p class="text-[10px] font-[900] text-pBlue uppercase mb-1">${t('SKU')} ${id.replace(/_/g, ' ')}</p>`;
                return `
                <div data-vid="${id}" onclick="switchVideo('${id}')" class="cursor-pointer group flex gap-4 items-center py-3 ${animCls}" style="animation-delay:${animDelay(i)}ms">
                    <div class="w-44 aspect-video border border-pGray overflow-hidden bg-white group-hover:border-pBlue transition-all flex-shrink-0">
                        ${thumbEl}
                    </div>
                    <div class="flex-1 min-w-0 border-b border-pGray pb-2">
                        ${metaEl}
                        <p class="text-sm font-semibold text-pAnthrazit leading-tight group-hover:text-pBlue">${t(id)}</p>
                    </div>
                </div>`;
            }).join('');
            switchVideo(cats[cat][0], true);
            // Load real Vimeo thumbnails async for Vimeo categories
            if (cats[cat].some(id => vimeoMap[id])) loadVimeoThumbs();
        }

        function switchVideo(id, isAuto = false) {
            const isVimeo = !!vimeoMap[id];
            activeVideoMode = isVimeo ? 'vimeo' : 'mp4';

            const player  = document.getElementById('main-player');
            const vimeoEl = document.getElementById('vimeo-player');
            const fade    = document.getElementById('fade-overlay');
            const bar     = document.getElementById('ctrl-bar');

            // ② Active playlist item highlight
            document.querySelectorAll('#sidebar-list [data-vid]').forEach(el => el.classList.remove('playlist-active'));
            const activeItem = document.querySelector(`#sidebar-list [data-vid="${id}"]`);
            if (activeItem) activeItem.classList.add('playlist-active');

            // ④ Product name + subline + SKU
            const nameEl    = document.getElementById('display-name');
            const sublineEl = document.getElementById('display-subline');
            const sublineSep= document.getElementById('display-subline-sep');
            const skuEl     = document.getElementById('display-sku');
            const sepEl     = document.getElementById('display-separator');
            const updateMeta = () => {
                const sub = getSubline(id);
                nameEl.innerText = t(id);
                if (sublineEl) {
                    sublineEl.innerText = sub;
                    sublineEl.style.display     = sub ? '' : 'none';
                    if (sublineSep) sublineSep.style.display = sub ? '' : 'none';
                }
                skuEl.innerText = isVimeo ? '' : t('SKU') + ' ' + id.replace(/_/g, ' ');
                if (sepEl) sepEl.style.display = isVimeo ? 'none' : '';
            };
            const metaEls = [nameEl, sublineEl, sublineSep, skuEl].filter(Boolean);
            if (!isAuto && nameEl.innerText) {
                metaEls.forEach(el => el.style.opacity = '0');
                setTimeout(() => { updateMeta(); metaEls.forEach(el => el.style.opacity = '1'); }, 250);
            } else {
                updateMeta();
            }

            // ⑧ Description update + collapse reset
            const descEl    = document.getElementById('video-desc-text');
            const descInner = document.getElementById('video-desc-inner');
            const moreBtn   = document.getElementById('video-desc-more');
            if (descEl) descEl.textContent = getDesc(id);
            if (descInner) { descInner.classList.remove('desc-expanded'); descInner.classList.add('desc-collapsed'); }
            if (moreBtn) { moreBtn.style.display = ''; moreBtn.textContent = t('Read_more') + ' ↓'; }

            const doSwitch = () => {
                const vimeoOverlay = document.getElementById('vimeo-overlay');
                if (isVimeo) {
                    // Stop MP4 and show Vimeo iframe
                    player.pause();
                    player.removeAttribute('src');
                    player.style.display = 'none';
                    if (bar) bar.classList.remove('visible');
                    vimeoEl.style.display = 'block';
                    if (vimeoOverlay) vimeoOverlay.style.display = 'block';
                    const vid = vimeoMap[id][activeLang] || vimeoMap[id]['EN'];
                    vimeoEl.src = `https://player.vimeo.com/video/${vid}?autoplay=1&title=0&byline=0&portrait=0&vimeo_logo=0&dnt=1`;
                    if (fade) fade.style.opacity = '0';
                } else {
                    // Stop Vimeo and show MP4 player
                    vimeoEl.src = '';
                    vimeoEl.style.display = 'none';
                    if (vimeoOverlay) vimeoOverlay.style.display = 'none';
                    player.style.display = 'block';
                    player.src = `https://videohub.pressol.iol.eu/frames/${id}_${activeLang}.mp4`;
                    player.addEventListener('canplay', () => {
                        player.play().catch(e => console.warn('play() blocked:', e));
                        setTimeout(() => { if (fade) fade.style.opacity = '0'; }, 40);
                    }, { once: true });
                }
            };

            if (isAuto) {
                doSwitch();
            } else {
                fade.style.opacity = '1';
                setTimeout(doSwitch, 300);
            }
        }

        function setLang(l) {
            document.querySelectorAll('.lang-menu').forEach(m => m.classList.add('hidden'));
            document.querySelectorAll('#sidebar-list [data-vid]').forEach(el => el.classList.add('lang-exit'));

            const nav = document.getElementById('nav-wrapper');
            nav.classList.add('shimmer');
            setTimeout(() => nav.classList.remove('shimmer'), 1400);

            setTimeout(() => {
                activeLang = l;
                renderLangs();
                _langAnim = true;
                loadCategory(activeCat);
                _langAnim = false;
            }, 320);
        }

        // ── MP4 player controls (guarded against Vimeo mode) ─────────────
        function syncVolIcons() {
            if (activeVideoMode === 'vimeo') return;
            const p = document.getElementById('main-player');
            const muted = p.muted || p.volume === 0;
            document.getElementById('icon-vol-on').style.display  = muted ? 'none' : '';
            document.getElementById('icon-vol-off').style.display = muted ? '' : 'none';
            if (!muted) document.getElementById('vol-slider').value = p.volume;
        }
        function toggleMute() {
            if (activeVideoMode === 'vimeo') return;
            const p = document.getElementById('main-player');
            p.muted = !p.muted;
            if (!p.muted && p.volume === 0) { p.volume = 1; document.getElementById('vol-slider').value = 1; }
            syncVolIcons();
        }
        function setVolume(val) {
            if (activeVideoMode === 'vimeo') return;
            const p = document.getElementById('main-player');
            p.volume = parseFloat(val);
            p.muted = (parseFloat(val) === 0);
            syncVolIcons();
        }
        function togglePlay() {
            if (activeVideoMode === 'vimeo') return;
            const p = document.getElementById('main-player');
            if (p.paused) {
                if (p.currentTime >= p.duration - 0.1) p.currentTime = 0;
                p.play().catch(() => {});
            } else {
                p.pause();
            }
        }
        function seekVideo(e) {
            if (activeVideoMode === 'vimeo') return;
            const p = document.getElementById('main-player');
            const track = document.getElementById('progress-track');
            const rect = track.getBoundingClientRect();
            const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
            if (p.duration) p.currentTime = pct * p.duration;
        }
        function toggleFullscreen() {
            const wrapper = document.getElementById('player-wrapper');
            const player  = document.getElementById('main-player');
            const isFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
            if (isFS) {
                if (document.exitFullscreen)            document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            } else if (activeVideoMode === 'vimeo') {
                if (wrapper.requestFullscreen)             wrapper.requestFullscreen().catch(() => {});
                else if (wrapper.webkitRequestFullscreen)  wrapper.webkitRequestFullscreen();
            } else {
                if (wrapper.requestFullscreen) {
                    wrapper.requestFullscreen().catch(() => {
                        if (player.webkitEnterFullscreen) player.webkitEnterFullscreen();
                    });
                } else if (wrapper.webkitRequestFullscreen) {
                    wrapper.webkitRequestFullscreen();
                } else if (player.webkitEnterFullscreen) {
                    player.webkitEnterFullscreen();
                }
            }
        }
        function formatTime(s) {
            if (!isFinite(s)) return '0:00';
            const m = Math.floor(s / 60);
            return m + ':' + String(Math.floor(s % 60)).padStart(2, '0');
        }

        // ── Player UI setup ───────────────────────────────────────────────
        (function setupPlayerUI() {
            const p       = document.getElementById('main-player');
            const wrapper = document.getElementById('player-wrapper');
            const bar     = document.getElementById('ctrl-bar');
            let hideTimer = null;

            function syncIcons() {
                if (activeVideoMode === 'vimeo') return;
                document.getElementById('icon-play').style.display  = p.paused  ? '' : 'none';
                document.getElementById('icon-pause').style.display = !p.paused ? '' : 'none';
            }
            p.addEventListener('play',  syncIcons);
            p.addEventListener('pause', syncIcons);
            p.addEventListener('volumechange', syncVolIcons);
            syncVolIcons();

            function showBar() {
                if (activeVideoMode === 'vimeo') return;
                bar.classList.add('visible');
                wrapper.classList.remove('hide-cursor');
                clearTimeout(hideTimer);
            }
            function scheduleHide() {
                clearTimeout(hideTimer);
                hideTimer = setTimeout(() => {
                    if (!p.paused || isEnded) {
                        bar.classList.remove('visible');
                        if (document.fullscreenElement) wrapper.classList.add('hide-cursor');
                    }
                }, 2000);
            }

            wrapper.addEventListener('mousemove', () => { showBar(); scheduleHide(); });
            wrapper.addEventListener('mouseleave', () => { if (!p.paused) scheduleHide(); });

            let _tapCount = 0, _tapTimer = null;
            wrapper.addEventListener('click', () => {
                if (activeVideoMode === 'vimeo') return;
                _tapCount++;
                if (_tapCount === 1) {
                    _tapTimer = setTimeout(() => {
                        _tapCount = 0;
                        togglePlay();
                        showBar(); scheduleHide();
                    }, 280);
                } else {
                    clearTimeout(_tapTimer);
                    _tapCount = 0;
                    toggleFullscreen();
                    showBar(); scheduleHide();
                }
            });

            let isEnded = false;
            p.addEventListener('ended', () => { isEnded = true; showBar(); scheduleHide(); });
            p.addEventListener('pause', () => { if (!isEnded) { showBar(); clearTimeout(hideTimer); } });
            p.addEventListener('play',  () => { isEnded = false; showBar(); scheduleHide(); });

            function onFSChange() {
                const isFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
                document.getElementById('icon-fs-expand').style.display = isFS ? 'none' : '';
                document.getElementById('icon-fs-shrink').style.display = isFS ? '' : 'none';
                if (activeVideoMode !== 'vimeo') { showBar(); if (!p.paused) scheduleHide(); }
            }
            document.addEventListener('fullscreenchange',       onFSChange);
            document.addEventListener('webkitfullscreenchange', onFSChange);

            p.addEventListener('webkitbeginfullscreen', () => {
                document.getElementById('icon-fs-expand').style.display = 'none';
                document.getElementById('icon-fs-shrink').style.display = '';
            });
            p.addEventListener('webkitendfullscreen', () => {
                document.getElementById('icon-fs-expand').style.display = '';
                document.getElementById('icon-fs-shrink').style.display = 'none';
            });

            (function rafLoop() {
                if (activeVideoMode === 'mp4' && p.duration) {
                    document.getElementById('progress-fill').style.width =
                        (p.currentTime / p.duration * 100).toFixed(4) + '%';
                    document.getElementById('time-display').textContent =
                        formatTime(p.currentTime) + ' / ' + formatTime(p.duration);
                }
                requestAnimationFrame(rafLoop);
            })();
        })();

        // Resume MP4 when tab comes back to foreground
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && activeVideoMode === 'mp4') {
                const p = document.getElementById('main-player');
                if (p && p.paused) p.play().catch(() => {});
            }
        });

        // ── Vimeo thumbnail loader (parallel fetches) ────────────────────
        const vimeoThumbCache = {};
        async function loadVimeoThumbs() {
            const items = [...document.querySelectorAll('#sidebar-list [data-vid]')]
                .filter(el => vimeoMap[el.dataset.vid]);

            // Fire all fetches simultaneously
            await Promise.allSettled(items.map(async item => {
                const id      = item.dataset.vid;
                const videoId = vimeoMap[id][activeLang] || vimeoMap[id]['EN'];
                const img     = item.querySelector('.vimeo-thumb-img');
                if (!img) return;

                // Serve from cache immediately (no network needed)
                if (vimeoThumbCache[videoId]) {
                    img.src = vimeoThumbCache[videoId];
                    img.style.objectFit = 'cover';
                    return;
                }

                try {
                    const resp = await fetch(
                        `https://vimeo.com/api/oembed.json?url=https://vimeo.com/${videoId}&width=400`
                    );
                    if (resp.ok) {
                        const data = await resp.json();
                        if (data.thumbnail_url) {
                            vimeoThumbCache[videoId] = data.thumbnail_url;
                            // Only update if item is still in the DOM (user didn't switch category)
                            if (item.isConnected) {
                                img.src = data.thumbnail_url;
                                img.style.objectFit = 'cover';
                            }
                        }
                    }
                } catch(e) { /* keep gradient placeholder */ }
            }));
        }

        // ── Trigger staggered page-content reveal ────────────────────────
        function triggerFadeUps() {
            document.querySelectorAll('.fade-up').forEach(el => el.classList.add('go'));
        }

        // ── Cinematic intro (once per session) ───────────────────────────
        let _introPlaying = false;
        (function initIntro() {
            const overlay = document.getElementById('intro-overlay');
            if (!overlay || overlay.style.display === 'none') {
                triggerFadeUps(); // repeat visit – reveal page immediately
                return;
            }
            _introPlaying = true;
            sessionStorage.setItem('ph_intro', '1');
            // Logo approach: 3.0 s → settle for ~0.6 s → start dismiss at 3.6 s
            setTimeout(() => {
                overlay.style.pointerEvents = 'none';
                overlay.classList.add('dismiss');
                setTimeout(triggerFadeUps, 400);
                setTimeout(() => { overlay.remove(); _introPlaying = false; }, 800);
            }, 3600);
        })();

        // ── Nav scroll hint + peek animation (mobile, once per session) ──
        (function initNavHint() {
            const nav  = document.getElementById('nav-groups');
            const hint = document.getElementById('nav-fade-hint');
            if (!nav || !hint) return;
            // Hide hint when user has scrolled to the end
            nav.addEventListener('scroll', () => {
                const atEnd = nav.scrollLeft + nav.clientWidth >= nav.scrollWidth - 8;
                hint.style.opacity = atEnd ? '0' : '1';
            }, { passive: true });
            // One-time peek animation so users discover the scroll
            if (window.innerWidth < 768 && !sessionStorage.getItem('ph_nav_peeked')) {
                sessionStorage.setItem('ph_nav_peeked', '1');
                const delay = _introPlaying ? 4800 : 700;
                setTimeout(() => {
                    nav.scrollTo({ left: 90, behavior: 'smooth' });
                    setTimeout(() => nav.scrollTo({ left: 0, behavior: 'smooth' }), 950);
                }, delay);
            }
        })();

        renderLangs();
        renderNav();
        loadCategory(activeCat);

        // ── Domain guard ─────────────────────────────────────────────────
        (function() {
            const ok = ['hub.pressol.iol.eu','localhost','127.0.0.1'];
            if (!ok.some(d => location.hostname === d || location.hostname.endsWith('.' + d))) {
                document.body.style.cssText = 'background:#f5f5f5;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;';
                document.body.innerHTML = '<p style="font-family:sans-serif;color:#aaa;font-size:14px;text-align:center;">© PRESSOL Lubrication Products GmbH<br>Confidential – Unauthorized reproduction prohibited.</p>';
            }
        })();

        // ── Anti copy-paste shortcuts ────────────────────────────────────
        document.addEventListener('keydown', function(e) {
            const k = e.key;
            if (k === 'F12') { e.preventDefault(); return; }
            if (e.ctrlKey || e.metaKey) {
                if (['u','U','s','S'].includes(k)) { e.preventDefault(); return; }
                if (e.shiftKey && ['I','J','C','i','j','c'].includes(k)) { e.preventDefault(); return; }
            }
        }, true);
        document.addEventListener('contextmenu', function(e) { e.preventDefault(); });
    </script>
